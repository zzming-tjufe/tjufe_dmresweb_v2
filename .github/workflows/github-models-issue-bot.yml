name: GitHub Models Repo Bot

on:
  issues:
    types: [opened]

  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write
  models: read

jobs:
  repo-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Review issue or pull request with GitHub Models
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const marker = "<!-- github-models-repo-bot -->";

            const isIssue = context.eventName === "issues";
            const isPR = context.eventName === "pull_request_target";

            const item = isIssue
              ? context.payload.issue
              : context.payload.pull_request;

            const number = item.number;
            const title = item.title || "";
            const body = item.body || "";

            let prompt = "";

            if (isIssue) {
              prompt = `
              你是一个 GitHub 仓库维护机器人，风格参考 RAGFlow 社区中的 DosuBot。
              你的任务不是只做简单分类，而是帮助维护者初步判断问题性质、可能原因和排查方向。

              请审核下面这个 Issue / Feature Request。

              仓库背景：
              - 这是一个前端 / AI 应用工程 / RAGFlow 相关项目。
              - 可能涉及 React、TypeScript、聊天页面、知识库管理、文件上传、SSE 流式输出、RAGFlow API、OpenAI-compatible API。
              - 如果 Issue 与前端有关，请重点关注状态管理、接口契约、异步请求、流式输出、文件上传、消息刷新、历史记录覆盖等问题。
              - 如果 Issue 与 RAG / 知识库有关，请重点关注检索、引用块、文件解析、知识库绑定、会话配置、prompt_config、API 返回结构等问题。

              请完成以下任务：

              1. 判断 Issue 类型：
                 - bug
                 - feature request
                 - question
                 - documentation
                 - incomplete
                 - duplicate candidate

              2. 如果是 bug，请进一步分析：
                 - 可能的问题位置
                 - 可能的原因
                 - 初步排查方向
                 - 是否可能是配置问题、前端状态问题、接口契约问题、后端返回问题、版本兼容问题、浏览器/部署环境问题

              3. 如果是 feature request，请分析：
                 - 这个需求想解决什么问题
                 - 当前描述是否足够清楚
                 - 是否有明确使用场景
                 - 是否有可能实现方向
                 - 是否可能与已有功能重复

              4. 如果是 question，请判断：
                 - 这是使用问题、配置问题、部署问题、API 使用问题，还是概念问题
                 - 应该让提问者补充什么信息

              5. 检查完整性：
                 对 bug，检查是否缺少：
                 - 项目版本 / commit
                 - 浏览器和操作系统
                 - 部署方式
                 - 复现步骤
                 - 实际结果
                 - 期望结果
                 - 控制台日志
                 - Network 请求/响应
                 - 截图或录屏

                 对 feature request，检查是否缺少：
                 - 问题背景
                 - 期望功能
                 - 使用场景
                 - 可接受的交互方式
                 - 可能实现方案
                 - 替代方案

              6. 输出建议 labels。
                 只能从这些 label 中选择：
                 - bug
                 - feature request
                 - question
                 - documentation
                 - needs reproduction
                 - needs more information
                 - frontend
                 - backend
                 - api
                 - streaming
                 - file upload
                 - knowledge base
                 - compatibility
                 - enhancement

              7. 不要声称已经运行代码。
              8. 不要声称已经复现问题。
              9. 如果信息不足，要明确说明“基于当前描述只能初步判断”。
              10. 用简洁中文回复。

              输出时必须包含下面几个部分：

              ## AI 自动审核

              ### 归类
              写出 Issue 类型。

              ### 问题摘要
              用 2-4 句话概括。

              ### 初步判断
              如果是 bug，分析可能出问题的位置。
              如果是 feature request，分析需求价值和清晰度。
              如果是 question，分析问题类型。

              ### 可能原因
              如果是 bug，列出 2-5 个可能原因。
              如果不是 bug，可以写“不适用”。

              ### 建议排查方向
              给维护者或提交者列出下一步该检查什么。

              ### 缺失信息
              列出当前 Issue 还缺什么。

              ### 建议标签
              用 Markdown 列表输出建议 label。

              ### 维护者建议
              给维护者一个处理建议，例如：等待补充信息、标记 bug、转为 question、要求复现、优先检查某个模块等。

              最后额外输出一个机器可读 JSON，必须放在最后，并用如下格式包裹：

              \`\`\`json
              {
                "labels": ["bug", "needs more information"]
              }
              \`\`\`

              Issue 标题：
              ${title}

              Issue 内容：
              ${body}
              `;
            }

            if (isPR) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: number,
                per_page: 100
              });

              const fileSummary = files.map(file => {
                const patch = file.patch || "";
                return `
                文件：${file.filename}
                状态：${file.status}
                新增行数：${file.additions}
                删除行数：${file.deletions}
                变更片段：
                ${patch.slice(0, 6000)}
                `;
              }).join("\n\n---\n\n");

              prompt = `
              你是一个 GitHub PR 代码审查助手。

              请根据下面这个 Pull Request 的标题、描述和代码 diff 进行审查。

              仓库背景：
              - 这是一个前端 / AI 应用工程 / RAGFlow 相关项目。
              - 可能涉及 React、TypeScript、聊天页面、知识库管理、文件上传、SSE 流式输出、RAGFlow API、OpenAI-compatible API。
              - 请重点关注真实风险，不要只纠结代码风格。

              任务：
              1. 总结这个 PR 做了什么。
              2. 检查是否有明显 bug、逻辑问题、边界条件问题。
              3. 检查是否可能影响现有功能。
              4. 检查是否缺少测试或手动验证步骤。
              5. 如果是前端项目，请特别关注：
                 - 状态管理
                 - 接口调用
                 - 异步逻辑
                 - 错误处理
                 - 用户体验
                 - SSE 流式输出
                 - 文件上传
                 - 知识库切换
                 - 历史消息刷新
              6. 如果涉及流式输出、文件上传、知识库、RAG、API 契约，请重点提示风险。
              7. 不要假装已经运行代码，只能基于 diff 做静态审查。
              8. 不要吹毛求疵，不要只提格式问题。
              9. 用简洁中文输出。

              输出格式：

              ## AI PR 审查

              ### 改动摘要
              ...

              ### 主要风险点
              - ...

              ### 可能影响范围
              - ...

              ### 建议修改
              - ...

              ### 建议测试
              - ...

              ### 维护者关注点
              ...

              PR 标题：
              ${title}

              PR 描述：
              ${body}

              PR 改动文件和 diff：
              ${fileSummary}
              `;
            }

            const response = await fetch("https://models.github.ai/inference/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${process.env.GITHUB_TOKEN}`,
                "Content-Type": "application/json",
                "Accept": "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28"
              },
              body: JSON.stringify({
                model: "openai/gpt-4.1",
                messages: [
                  {
                    role: "system",
                    content: "你是一个严谨、简洁的 GitHub 仓库维护与代码审查机器人。"
                  },
                  {
                    role: "user",
                    content: prompt
                  }
                ],
                temperature: 0.2
              })
            });

            if (!response.ok) {
              const errorText = await response.text();
              throw new Error(`GitHub Models error: ${response.status} ${errorText}`);
            }

            const data = await response.json();
            const text = data.choices?.[0]?.message?.content || "模型没有返回有效内容。";

            const commentBody = `${marker}

            ${text}

            ---
            _由 GitHub Models Repo Bot 自动生成。_`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: number,
              per_page: 100
            });

            const oldComment = comments.find(comment =>
              comment.body && comment.body.includes(marker)
            );

            if (oldComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: oldComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: number,
                body: commentBody
              });
            }

            if (isIssue) {
              const jsonMatch = text.match(/```json\s*([\s\S]*?)\s*```/);

              if (jsonMatch) {
                try {
                  const parsed = JSON.parse(jsonMatch[1]);
                  const labels = Array.isArray(parsed.labels) ? parsed.labels : [];

                  const allowedLabels = [
                    "bug",
                    "feature request",
                    "question",
                    "documentation",
                    "needs reproduction",
                    "needs more information",
                    "frontend",
                    "backend",
                    "api",
                    "streaming",
                    "file upload",
                    "knowledge base",
                    "compatibility",
                    "enhancement"
                  ];

                  const finalLabels = labels.filter(label => allowedLabels.includes(label));

                  if (finalLabels.length > 0) {
                    try {
                      await github.rest.issues.addLabels({
                        owner,
                        repo,
                        issue_number: number,
                        labels: finalLabels
                      });
                    } catch (labelError) {
                      core.warning(`Failed to add labels. Make sure labels exist in the repository. ${labelError.message}`);
                    }
                  }
                } catch (parseError) {
                  core.warning(`Failed to parse labels JSON: ${parseError.message}`);
                }
              }
            }